name: Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_WORKSPACE_ID: ${{ secrets.VITE_SUPABASE_WORKSPACE_ID }}
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Sign APK
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks /tmp/release.keystore \
            --ks-key-alias ${{ secrets.RELEASE_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.RELEASE_KEY_PASSWORD }} \
            --key-pass pass:${{ secrets.RELEASE_KEY_PASSWORD }} \
            --out android/app/build/outputs/apk/debug/app-debug-signed.apk \
            android/app/build/outputs/apk/debug/app-debug.apk
          mv android/app/build/outputs/apk/debug/app-debug-signed.apk \
             android/app/build/outputs/apk/debug/app-debug.apk

      - name: Get versionCode
        id: ver
        run: |
          CODE=$(grep 'versionCode' android/app/build.gradle | grep -o '[0-9]\+')
          echo "code=$CODE" >> $GITHUB_OUTPUT
          python3 scripts/rename_apk.py "$CODE"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.code }}
          name: v${{ steps.ver.outputs.code }}
          files: android/app/build/outputs/apk/debug/V*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
